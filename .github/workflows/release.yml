# Miloco 发版流水线 —— GitHub Release 是唯一发布渠道（无 PyPI / npm）。
#
# ── 怎么发版 ──────────────────────────────────────────────────────────────
#   推一个 v 开头的 tag 即触发。版本号 = CalVer YYYY.M.D（月/日不补零），示例：
#     正式版    git tag v2026.6.17        && git push origin v2026.6.17
#     预发布版  git tag v2026.6.17-beta.1 && git push origin v2026.6.17-beta.1
#   预发布段支持 -alpha.N | -beta.N | -rc.N（格式校验见 scripts/version_normalize.py）。
#   tag 是版本号的唯一真源：Python 包经 hatch-vcs / SETUPTOOLS_SCM_PRETEND_VERSION 从 tag 派生，
#   不改源文件、不回写。同名版本若已发布会被预检拦下，需 bump 版本重发。
#
# ── 发出来什么 ────────────────────────────────────────────────────────────
#   每个 tag 产出一个 GitHub Release（v{ver}），含：
#     · 4 个平台一体归档  miloco-{darwin-arm64,darwin-x86_64,linux-x86_64,linux-aarch64}-{ver}.tar.gz
#         （各含该平台 miot/miloco/cli wheel + openclaw tgz + 模型 tarball）
#     · 自包含安装脚本    install.sh / install.ps1
#   正式版自动标 Latest；预发布版标 prerelease（不顶替 Latest）。
#
# ── 用户怎么装 ────────────────────────────────────────────────────────────
#   curl -LsSf https://github.com/XiaoMi/xiaomi-miloco/releases/latest/download/install.sh | bash
#   latest 是 GitHub 内置别名，永远解析到最新「正式版」Release 并取其中的 install.sh——所以不必
#   单独维护名为 latest 的 tag。脚本内嵌 manifest 锁定版本号 + 各归档 SHA，按版本可复现安装。
#
# ── 发版前自检 ────────────────────────────────────────────────────────────
#   Actions 手动触发勾选 dry_run=true：只构建 + 预检 + 组装资产预览，不发布、不建 release。
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（不含 v，如 1.0.0）。留空则用触发 tag。"
        required: false
      dry_run:
        description: "dry-run：只构建+预检+组装预览，不发布/不建 release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/uv.lock
            cli/uv.lock

      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            plugins/openclaw/pnpm-lock.yaml

      - name: 解析版本号（tag 优先，其次手动输入）
        id: ver
        run: |
          V="${{ inputs.version }}"
          [ -z "$V" ] && V="${GITHUB_REF_NAME#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "发布版本: $V"

      - name: 校验版本号格式（CalVer YYYY.M.D，拒绝前导零/带 v/非法预发布）
        run: python3 scripts/version_normalize.py "${{ steps.ver.outputs.version }}" --validate

      - name: 构建全部产物到 dist/（--version 统一 stamp + 平台归档 + manifest.bundles）
        run: bash scripts/build.sh --version "${{ steps.ver.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 版本占用预检：v{ver} 的 GitHub Release 已存在 → 中止（请 bump 版本后重试）──
  preflight:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检查 GitHub Release v{ver} 是否已发布
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.build.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG 已存在，终止本次发布（请 bump 版本后重试）"
            exit 1
          fi
          echo "✓ Release $TAG 未发布，可发布"

  # ── 发布到 GitHub Release（dry-run 时整体跳过）─────────────────────────────
  github-release:
    needs: [build, preflight]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }

      - name: 暂存 release 资产（4 平台归档 + 自包含安装脚本，归档名取自 manifest.bundles）
        run: |
          set -euo pipefail
          mkdir -p assets
          cp dist/install.sh dist/install.ps1 assets/
          python3 - <<'PY'
          import json, shutil, pathlib
          dist = pathlib.Path("dist")
          man = json.loads((dist / "manifest.json").read_text())
          names = [b["name"] for b in man.get("bundles", {}).values()]
          if not names:
              raise SystemExit("::error::manifest.bundles 为空，没有平台归档可发布")
          for n in names:
              shutil.copy2(dist / n, pathlib.Path("assets") / n)
          print("release 资产:", sorted(p.name for p in pathlib.Path("assets").iterdir()))
          PY

      - name: 发布到版本 tag（正式版标 --latest，预发布版标 --prerelease）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.build.outputs.version }}"
          # version_normalize.py 的正则保证：预发布版必含 '-'（-alpha/-beta/-rc），正式版绝无 '-'。
          # 正式版 --latest 显式成为 GitHub Latest（/releases/latest/download/install.sh 据此解析）；
          # 预发布版 --prerelease 不顶替 Latest，普通用户 curl 仍拿最新稳定版引导脚本。
          if [[ "${{ needs.build.outputs.version }}" == *-* ]]; then
            rel_flag="--prerelease"
          else
            rel_flag="--latest"
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" $rel_flag --title "$TAG" --generate-notes --repo "$GITHUB_REPOSITORY" assets/*
          fi

  # ── dry-run 专用：组装资产预览 + 汇总将发布什么（不碰 release）─────────────────
  dry-run-preview:
    needs: [build, preflight]
    if: ${{ github.event.inputs.dry_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - name: 组装并汇总（dry-run，不发布）
        run: |
          set -euo pipefail
          echo "== dry-run 版本: ${{ needs.build.outputs.version }} =="
          mkdir -p assets
          cp dist/install.sh dist/install.ps1 assets/
          python3 - <<'PY'
          import json, shutil, pathlib
          dist = pathlib.Path("dist")
          man = json.loads((dist / "manifest.json").read_text())
          names = [b["name"] for b in man.get("bundles", {}).values()]
          print("-- 将上传 v{ver} 的平台归档 --")
          print("  ", names or "（空！build 未产出平台归档）")
          print("   下载 tag:", man.get("download", {}).get("tag"))
          for n in names:
              shutil.copy2(dist / n, pathlib.Path("assets") / n)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets-dryrun
          path: assets/
          retention-days: 7
