# 维护者手动触发的 PR 审查：在 PR 评论里发 "/review" 即对该 PR 跑一次 /review-pr。
# 用途：fork PR 拿不到 secrets，被 pr-review.yml 的同仓门控跳过；改由维护者人工过目后评论触发，
# 在 base 仓上下文里跑（issue_comment 自带 secrets）。安全边界 = 评论者须有 write+ 权限 + 钉死触发时刻的 head SHA。
name: PR Review (command)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write # 发 / 改 review-pr-ci 评论、加 reaction
  statuses: write # 把门禁结论打到 head SHA 的 commit status
  packages: read # 拉 ghcr 上的审查镜像

concurrency:
  group: pr-review-cmd-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # 轻量授权门：用评论自带的 author_association 判定（OWNER/MEMBER/COLLABORATOR=可信内部人），
  # 挡住外部贡献者在自己 fork PR 下自助触发带 key 的流程。
  # 用 author_association 而非 `gh api collaborators/<user>/permission`：后者权限要求在 org 仓不确定，
  # token 不足时会对所有人 403→静默拒绝；author_association 是 webhook 自带字段，无 API、无 token 依赖。
  # 注：MEMBER 含只读 org 成员（比"对本仓有 write"略宽），对"挡外部人"这个目标足够。
  authorize:
    if: >-
      github.event.issue.pull_request != null
      && startsWith(github.event.comment.body, '/review')
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.gate.outputs.head_sha }}
      matched: ${{ steps.check.outputs.matched }}
    steps:
      - name: 校验评论命令
        id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          BODY="$(printf '%s' "$COMMENT_BODY" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ "$BODY" = "/review" ] || printf '%s' "$BODY" | grep -q '^/review '; then
            echo "matched=true" >> "$GITHUB_OUTPUT"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
            SAFE_BODY="$(printf '%s' "$BODY" | tr '\n' ' ')"
            echo "::notice::跳过：评论内容不匹配 /review 命令（trim 后为: ${SAFE_BODY}）"
          fi

      - name: 钉死 head SHA
        if: steps.check.outputs.matched == 'true'
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
        run: |
          # 钉死触发此刻的 head SHA：维护者背书的是这个 commit，审查也必须审它（防触发后被换包）
          HEAD_SHA=$(gh api "repos/$REPO/pulls/$PR" --jq '.head.sha')
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: 回应 👀 表示已收到
        if: success() && steps.check.outputs.matched == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=eyes >/dev/null 2>&1 || true

  # needs: authorize —— authorize 被 if 跳过（非授权人）或评论不匹配时本 job 也随之跳过
  review:
    needs: authorize
    if: needs.authorize.outputs.matched == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/xiaomi/xiaomi-miloco/pr-review:trixie
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      PR_AGENT_MODEL: ${{ vars.PR_AGENT_MODEL }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          # 钉死 head SHA：refs/pull/<n>/head 在 base 仓里对 fork PR 也可拉；fetch-depth 0 供命令内 merge-base 比对
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0

      - name: 校验 head 未被偷换
        run: |
          GOT=$(git rev-parse HEAD)
          if [ "$GOT" != "${{ needs.authorize.outputs.head_sha }}" ]; then
            echo "::error::PR head 从授权时的 ${{ needs.authorize.outputs.head_sha }} 变为 $GOT，疑似触发后改包，已中止"
            exit 1
          fi

      - name: 允许 git 访问工作区
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: AI 审查并按严重度门禁
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
          HEAD_SHA: ${{ needs.authorize.outputs.head_sha }}
        run: |
          git fetch origin main

          # 跑 base 分支上的共用审查+门禁脚本（与 pr-review.yml 同一份，单一来源）。
          # 用 git show 取 base 版本而非当前 checkout——fork PR 改不动这段逻辑；
          # 脚本内部会清掉 fork PR 树里的不可信配置并从 base 取回可信命令文件（见脚本头部安全模型）。
          if git show origin/main:.ci/pr-review-gate.sh | bash -s -- "$PR_NUMBER" "${{ github.repository }}"; then
            STATE=success
            DESC="未发现严重/重要问题"
          else
            STATE=failure
            DESC="发现严重/重要问题"
          fi

          # issue_comment 触发的 run 不会自动成为 PR 的 check；把结论打到 head SHA 的 commit status，
          # 让结果显示在 PR 上，也可在分支保护里设为 required check 来真正阻断 merge
          gh api "repos/${{ github.repository }}/statuses/$HEAD_SHA" \
            -f state="$STATE" -f context="pr-review" -f description="$DESC" >/dev/null

          [ "$STATE" = success ]
